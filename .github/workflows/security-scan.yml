name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"
      - "dashboard/**"
      - "terraform/**"
      - "Dockerfile"
      - "Dockerfile.dashboard"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security-scan.yml"
      - ".github/workflows/ci.yml"
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

# Performance: Cancel in-flight runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.9.21"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}
          
      - name: Install dependencies
        run: uv sync --locked --group dev
        
      - name: Run Bandit SAST
        run: uv run bandit -r app/ -ll
        
      - name: Run pip-audit
        run: uv run pip-audit
        
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.93.0

      - name: Gitleaks Secret Scan (OSS, Commit Range Gate)
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            LOG_OPTS="${{ github.event.before }}..${{ github.sha }}"
          else
            LOG_OPTS="HEAD~1..HEAD"
          fi

          echo "Running OSS gitleaks commit-range scan: ${LOG_OPTS}"
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.2 \
            git --redact --exit-code 1 --no-banner --log-opts="${LOG_OPTS}" /repo

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: valdrics-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          load: true
          tags: valdrics-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'valdrics-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (Dashboard)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'valdrics-dashboard:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-dashboard-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Backend Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Dashboard Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-dashboard-results.sarif') != ''
        with:
          sarif_file: 'trivy-dashboard-results.sarif'
          category: 'trivy-dashboard'

  dast-zap-baseline:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-latest
    needs: [container-scan]
    timeout-minutes: 35
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Prepare ephemeral QA environment
        shell: bash
        run: |
          set -euo pipefail
          cp .env.example .env
          python3 - <<'PY'
          from pathlib import Path
          import base64

          path = Path(".env")
          lines = path.read_text(encoding="utf-8").splitlines()
          overrides = {
              "ENVIRONMENT": "development",
              "DEBUG": "False",
              "CSRF_SECRET_KEY": "dast_csrf_secret_key_2026_0123456789abcdef",
              "ENCRYPTION_KEY": "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef",
              "KDF_SALT": base64.b64encode(b"12345678901234567890123456789012").decode(),
              "SUPABASE_JWT_SECRET": "dast_supabase_jwt_secret_2026_0123456789abcdef",
              "ADMIN_API_KEY": "dast_admin_api_key_2026_0123456789abcdef",
              "DATABASE_URL": "postgresql+asyncpg://postgres:local-dev-change-me@postgres:5432/valdrics",
              "REDIS_URL": "redis://redis:6379",
              "APP_RUNTIME_DATA_DIR": "/tmp/valdrics",
              "CIRCUIT_BREAKER_DISTRIBUTED_STATE": "true",
              "CIRCUIT_BREAKER_DISTRIBUTED_KEY_PREFIX": "valdrics:circuit",
              "PAYSTACK_WEBHOOK_ALLOWED_IPS": "[\"52.31.139.75\",\"52.49.173.169\",\"52.214.14.220\"]",
          }

          rendered = []
          seen = set()
          for line in lines:
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0].strip()
                  if key in overrides:
                      rendered.append(f"{key}={overrides[key]}")
                      seen.add(key)
                      continue
              rendered.append(line)
          for key, value in overrides.items():
              if key not in seen:
                  rendered.append(f"{key}={value}")
          path.write_text("\n".join(rendered) + "\n", encoding="utf-8")
          PY

      - name: Start ephemeral QA stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d --build postgres redis api dashboard

      - name: Wait for QA readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            api_ready=0
            ui_ready=0
            if curl -fsS http://localhost:8000/health/live >/dev/null 2>&1; then
              api_ready=1
            fi
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              ui_ready=1
            fi
            if [ "$api_ready" -eq 1 ] && [ "$ui_ready" -eq 1 ]; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          echo "Ephemeral QA stack did not become healthy in time."
          exit 1

      - name: Run OWASP ZAP Baseline against ephemeral QA
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a -j -m 5 -T 60"

      - name: Tear down ephemeral QA stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker compose down -v
